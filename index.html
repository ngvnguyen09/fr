<!doctype html>
<html>
  <head>
    <title>Gửi e...</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="language" content="vi-VN" />
    <meta name="title" content="Thuy Tien" />
    <meta
      name="github"
      content="https://github.com/sun0225SUN/Awesome-Love-Code"
    />
    <meta name="describe" content="Chúc mừng ngày Quốc tế Phụ nữ 8/3" />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://cdn.jsdelivr.net/gh/sun0225SUN/photos/img/20210715233345.png"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      .city {
        width: 100%;
        position: fixed;
        bottom: 0px;
        z-index: 100;
      }

      .city img {
        width: 100%;
      }

      audio {
        opacity: 0;
      }

      /* Canvas phải fixed để không đẩy layout */
      #cas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* Chặn scroll ngang trên mobile */
      html, body {
        max-width: 100vw;
        overflow-x: hidden;
      }
    </style>
    <title>Mừng 8/3 ✨</title>
    <link href="modal.css" rel="stylesheet" />
  </head>

  <body onselectstart="return false">
    <!--对话部分-->
    <div class="share_img"><img src="a8b.png" alt="" /></div>

    <div class="page_one">
      <div class="content">
        <div class="text_wrapper">
          <img src="a8.png" alt="" />
          <div class="text">Bà ơi 🌸<br>Hôm nay là ngày 8/3<br>Tão có điều muốn gửi đến bà nè 💕</div>
        </div>
      </div>
      <div class="btn-groups">
        <div class="heart-btn">
          <div id="yes" class="btn btn-a"><span>Mở ra 🌸</span></div>
        </div>
      </div>
    </div>
    <!--烟花部分-->
    <canvas id="cas" style="background-color: rgba(0, 5, 24, 1); position:fixed; top:0; left:0;">
      Trình duyệt không hỗ trợ canvas
    </canvas>
    <div class="city">
      <img src="city.png" alt="" />
    </div>
    <img src="moon.png" alt="" id="moon" style="visibility: hidden" />
    <div style="display: none">
      <div class="shape">Bà</div>
      <div class="shape">Hôm nay</div>
      <div class="shape">là 8/3</div>
      <div class="shape">Tão chúc bà</div>
      <div class="shape">Hạnh phúc</div>
      <div class="shape">Mạnh khỏe</div>
      <div class="shape">Xinh gái</div>
      <div class="shape">Vui vẻ</div>
      <div class="shape">Số 🥇</div>
      <div class="shape">💖</div>
    </div>
    <!--音乐部分-->
    <audio autoplay loop id="music">
      <source src="music.mp3" />
    </audio>
    <iframe
      id="iframMusic"
      allow="autoplay"
      style="display: none"
      src="about:blank"
    ></iframe>
    <script src="jquery.min.js"></script>
    <script src="fire.js"></script>
    <script src="talk.js"></script>
  </body>
</html>
